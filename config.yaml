# EMI Challenge Configuration

# Data
data:
  raw_dir: data/raw
  processed_dir: data/processed
  splits_dir: data/splits
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

# Model
model:
  name: baseline
  input_dim: null  # Set after data exploration
  output_dim: 1    # Continuous EMI intensity
  hidden_dim: 256
  num_layers: 3
  dropout: 0.2

# Training
training:
  epochs: 100
  batch_size: 32
  learning_rate: 1e-3
  weight_decay: 1e-5
  optimizer: adam
  scheduler: cosine  # or linear, step
  device: cuda:0
  num_workers: 4
  seed: 42

# Loss & Metrics
loss:
  name: mse  # mse, l1, huber
  
metrics:
  - mse
  - mae
  - pearson_correlation

# Checkpoint
checkpoint:
  save_dir: results/checkpoints
  save_frequency: 5  # Save every N epochs
  keep_best: true

# Logging
logging:
  log_dir: results/logs
  use_wandb: false
  wandb_project: emi-challenge
